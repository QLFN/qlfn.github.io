<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diedrich.me</title>
  <style>
    html, body {
      margin: 0;
      background: black;
      overflow: hidden;
      height: 100%;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fg"></canvas>
<script>
const bgCanvas = document.getElementById("bg");
const fgCanvas = document.getElementById("fg");
const bgCtx = bgCanvas.getContext("2d", { alpha: false });
const fgCtx = fgCanvas.getContext("2d");
const blockSize = 2;
const text = atob("ZGllZHJpY2gubWU=");

// Active-region + noise-buffer state (only the bounding box of "on"
// blocks is ever tracked, instead of the whole canvas grid)
let onBlocks = [];      // Uint32Array pairs packed as row<<16 | col (relative to bounding box)
let rowOffset = 0, colOffset = 0, rowCount = 0, colCount = 0;
let noiseBuffer = [];   // array of Uint8ClampedArray rows, length rowCount, each length colCount
let fgImageData = null;
let fgData = null;
let bgImageDataOriginal = null; // pristine (un-glitched) background, restored/rebuilt from
let activeGlitches = [];        // list of {x0,y0,x1,y1,dx,dy,endTime}

function resize() {
  bgCanvas.width = fgCanvas.width = window.innerWidth;
  bgCanvas.height = fgCanvas.height = window.innerHeight;

  drawStaticBackground();

  const fontSize = getMaxFontSize(text);
  const mask = createTextMask(text, fontSize);
  computeOnBlocks(mask);
  generateNoiseBuffer();

  fgImageData = fgCtx.createImageData(fgCanvas.width, fgCanvas.height);
  fgData = fgImageData.data;

  activeGlitches = [];
}
window.addEventListener("resize", resize);
resize();

function drawStaticBackground() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const imgData = bgCtx.createImageData(w, h);
  const data = imgData.data;

  for (let y = 0; y < h; y += blockSize) {
    const yEnd = Math.min(y + blockSize, h);
    for (let x = 0; x < w; x += blockSize) {
      const s = (Math.random() * 255) | 0;
      const xEnd = Math.min(x + blockSize, w);
      for (let by = y; by < yEnd; by++) {
        let idx = (by * w + x) * 4;
        for (let bx = x; bx < xEnd; bx++) {
          data[idx] = s;
          data[idx + 1] = s;
          data[idx + 2] = s;
          data[idx + 3] = 255;
          idx += 4;
        }
      }
    }
  }
  bgCtx.putImageData(imgData, 0, 0);
  bgImageDataOriginal = imgData;
}

function getMaxFontSize(text) {
  const tmp = document.createElement("canvas");
  tmp.width = fgCanvas.width;
  tmp.height = fgCanvas.height;
  const ctx = tmp.getContext("2d");
  const maxWidth = fgCanvas.width * 0.9;
  const maxSize = fgCanvas.height * 0.5;

  let size = 10;
  do {
    ctx.font = `bold ${size}px sans-serif`;
    size++;
  } while (ctx.measureText(text).width < maxWidth && size < maxSize);
  return size - 1;
}

function createTextMask(text, fontSize) {
  const temp = document.createElement("canvas");
  temp.width = fgCanvas.width;
  temp.height = fgCanvas.height;
  const ctx = temp.getContext("2d");
  ctx.font = `bold ${fontSize}px sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillStyle = "white";
  ctx.fillText(text, temp.width / 2, temp.height / 2);
  return ctx.getImageData(0, 0, temp.width, temp.height);
}

// Precompute which blocks are "on" once (instead of every animation frame),
// and shrink the tracked grid down to the bounding box of the text so the
// per-frame noise generation/scrolling only touches the relevant region.
function computeOnBlocks(mask) {
  const w = fgCanvas.width, h = fgCanvas.height;
  const rows = Math.ceil(h / blockSize);
  const cols = Math.ceil(w / blockSize);
  const data = mask.data;

  let minRow = Infinity, maxRow = -Infinity, minCol = Infinity, maxCol = -Infinity;
  const rawOn = [];

  for (let y = 0; y < rows; y++) {
    const py = y * blockSize;
    const rowBase = py * w * 4;
    for (let x = 0; x < cols; x++) {
      const px = x * blockSize;
      const i = rowBase + px * 4;
      if (data[i + 3] > 128) {
        rawOn.push(y, x);
        if (y < minRow) minRow = y;
        if (y > maxRow) maxRow = y;
        if (x < minCol) minCol = x;
        if (x > maxCol) maxCol = x;
      }
    }
  }

  if (rawOn.length === 0) {
    onBlocks = new Uint32Array(0);
    rowOffset = colOffset = rowCount = colCount = 0;
    return;
  }

  rowOffset = minRow;
  colOffset = minCol;
  rowCount = maxRow - minRow + 1;
  colCount = maxCol - minCol + 1;

  onBlocks = new Uint32Array(rawOn.length / 2);
  for (let k = 0, i = 0; i < rawOn.length; i += 2, k++) {
    const relRow = rawOn[i] - rowOffset;
    const relCol = rawOn[i + 1] - colOffset;
    onBlocks[k] = (relRow << 16) | relCol;
  }
}

function generateNoiseBuffer() {
  noiseBuffer = new Array(rowCount);
  for (let r = 0; r < rowCount; r++) {
    const row = new Uint8ClampedArray(colCount);
    for (let c = 0; c < colCount; c++) row[c] = (Math.random() * 255) | 0;
    noiseBuffer[r] = row;
  }
}

function scrollNoiseBuffer() {
  if (rowCount === 0) return;
  const newRow = new Uint8ClampedArray(colCount);
  for (let c = 0; c < colCount; c++) newRow[c] = (Math.random() * 255) | 0;
  noiseBuffer.pop();
  noiseBuffer.unshift(newRow);
}

// --- Glitches ----------------------------------------------------------
// Each glitch is a rectangular region plus a (dx, dy) shift. The pixels
// inside the rectangle get wrapped/shifted *within their own rectangle*.
// Crucially, every glitch is applied identically -- same rectangle, same
// shift -- to both the background and foreground pixel buffers. Since
// both layers carry noise from the same random distribution, permuting
// their pixels together (in any shape) never reveals anything in a
// single still frame; the shape only ever emerges from the foreground
// refreshing every frame while the background holds still.
const MAX_ACTIVE_GLITCHES = 200;

function makeHBar(w, h) {
  const bandH = 6 + ((Math.random() * 50) | 0);
  const y0 = (Math.random() * Math.max(1, h - bandH)) | 0;
  const dx = (Math.random() < 0.5 ? -1 : 1) * (15 + ((Math.random() * 90) | 0));
  return { x0: 0, y0, x1: w, y1: Math.min(h, y0 + bandH), dx, dy: 0 };
}
function makeVBar(w, h) {
  const bandW = 6 + ((Math.random() * 50) | 0);
  const x0 = (Math.random() * Math.max(1, w - bandW)) | 0;
  const dy = (Math.random() < 0.5 ? -1 : 1) * (15 + ((Math.random() * 90) | 0));
  return { x0, y0: 0, x1: Math.min(w, x0 + bandW), y1: h, dx: 0, dy };
}
function makeBlock(w, h) {
  const bw = 30 + ((Math.random() * 150) | 0);
  const bh = 20 + ((Math.random() * 110) | 0);
  const x0 = (Math.random() * Math.max(1, w - bw)) | 0;
  const y0 = (Math.random() * Math.max(1, h - bh)) | 0;
  const dx = (Math.random() < 0.5 ? -1 : 1) * (10 + ((Math.random() * bw * 0.6) | 0));
  const dy = (Math.random() < 0.5 ? -1 : 1) * (5 + ((Math.random() * bh * 0.6) | 0));
  return { x0, y0, x1: Math.min(w, x0 + bw), y1: Math.min(h, y0 + bh), dx, dy };
}
function makeThinFlicker(w, h) {
  const bandH = 1 + ((Math.random() * 3) | 0);
  const y0 = (Math.random() * Math.max(1, h - bandH)) | 0;
  const dx = (Math.random() < 0.5 ? -1 : 1) * (20 + ((Math.random() * 120) | 0));
  return { x0: 0, y0, x1: w, y1: Math.min(h, y0 + bandH), dx, dy: 0 };
}

// [kind factory, trigger chance per tick, min duration ms, max extra duration ms]
const GLITCH_KINDS = [
  [makeHBar,       0.045, 250, 350],
  [makeVBar,       0.03,  250, 350],
  [makeBlock,      0.035, 300, 400],
  [makeThinFlicker, 0.09,  40,  70]
];

function updateGlitchState(now) {
  const before = activeGlitches.length;
  activeGlitches = activeGlitches.filter(g => now < g.endTime);
  let changed = activeGlitches.length !== before;

  const w = fgCanvas.width, h = fgCanvas.height;
  for (const [factory, chance, minDur, extraDur] of GLITCH_KINDS) {
    if (activeGlitches.length >= MAX_ACTIVE_GLITCHES) break;
    if (Math.random() < chance) {
      const rect = factory(w, h);
      rect.endTime = now + minDur + Math.random() * extraDur;
      activeGlitches.push(rect);
      changed = true;
    }
  }

  if (changed) rebuildBackgroundGlitch();
}

function rebuildBackgroundGlitch() {
  const w = bgCanvas.width, h = bgCanvas.height;
  if (activeGlitches.length === 0) {
    bgCtx.putImageData(bgImageDataOriginal, 0, 0);
    return;
  }
  const buf = new Uint8ClampedArray(bgImageDataOriginal.data);
  for (const g of activeGlitches) shiftRect(buf, w, g, g.dx, g.dy);
  bgCtx.putImageData(new ImageData(buf, w, h), 0, 0);
}

// Shifts the pixels inside [x0,x1)x[y0,y1) by (dx,dy), wrapping around
// within that rectangle only (so it reads as a self-contained tear).
function shiftRect(buffer, w, rect, dx, dy) {
  const { x0, y0, x1, y1 } = rect;
  const rw = x1 - x0, rh = y1 - y0;
  if (rw <= 0 || rh <= 0) return;
  const sdx = ((dx % rw) + rw) % rw;
  const sdy = ((dy % rh) + rh) % rh;
  if (sdx === 0 && sdy === 0) return;

  const tmp = new Uint8ClampedArray(rw * rh * 4);
  for (let y = 0; y < rh; y++) {
    const srcY = y0 + ((y - sdy + rh) % rh);
    const srcRowBase = srcY * w * 4;
    const tmpRowBase = y * rw * 4;
    for (let x = 0; x < rw; x++) {
      const srcX = x0 + ((x - sdx + rw) % rw);
      const so = srcRowBase + srcX * 4;
      const to = tmpRowBase + x * 4;
      tmp[to] = buffer[so];
      tmp[to + 1] = buffer[so + 1];
      tmp[to + 2] = buffer[so + 2];
      tmp[to + 3] = buffer[so + 3];
    }
  }
  for (let y = 0; y < rh; y++) {
    const destStart = ((y0 + y) * w + x0) * 4;
    const tmpRowStart = y * rw * 4;
    buffer.set(tmp.subarray(tmpRowStart, tmpRowStart + rw * 4), destStart);
  }
}

const targetFPS = 3;
const frameInterval = 1000 / targetFPS;
let lastFrameTime = 0;

function animate(timestamp) {
  requestAnimationFrame(animate);

  if (timestamp - lastFrameTime < frameInterval) return;
  lastFrameTime = timestamp;

  updateGlitchState(timestamp);

  const w = fgCanvas.width, h = fgCanvas.height;

  if (fgData) {
    fgData.fill(0); // fully transparent, replaces clearRect

    for (let k = 0; k < onBlocks.length; k++) {
      const packed = onBlocks[k];
      const relRow = packed >> 16;
      const relCol = packed & 0xffff;

      const y = relRow + rowOffset;
      const x = relCol + colOffset;
      const px = x * blockSize;
      const py = y * blockSize;

      const s = noiseBuffer[relRow][relCol];
      const xEnd = Math.min(px + blockSize, w);
      const yEnd = Math.min(py + blockSize, h);

      for (let by = py; by < yEnd; by++) {
        let idx = (by * w + px) * 4;
        for (let bx = px; bx < xEnd; bx++) {
          fgData[idx] = s;
          fgData[idx + 1] = s;
          fgData[idx + 2] = s;
          fgData[idx + 3] = 255;
          idx += 4;
        }
      }
    }

    // Apply the exact same glitch rectangles to the foreground buffer as
    // were applied to the background, so the two layers stay in lockstep.
    for (const g of activeGlitches) shiftRect(fgData, w, g, g.dx, g.dy);

    fgCtx.putImageData(fgImageData, 0, 0);
  }

  scrollNoiseBuffer();
}
requestAnimationFrame(animate);
</script>
</body>
</html>
